<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fahrtenbuch"/>
<meta name="theme-color" content="#050508"/>
<title>Fahrtenbuch</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050508;
  --bg2: #0c0c14;
  --card: #0f0f1a;
  --card2: #161624;
  --border: #1e1e30;
  --border2: #2a2a40;
  --green: #00ff88;
  --green2: #00cc6a;
  --red: #ff3355;
  --amber: #ffaa00;
  --blue: #4488ff;
  --text: #eeeef8;
  --text2: #9999bb;
  --text3: #555570;
  --display: 'Bebas Neue', sans-serif;
  --mono: 'DM Mono', monospace;
  --body: 'Outfit', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100dvh;
  overflow-x: hidden;
  overflow-y: auto;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:0.6;
}
#app {
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  padding-bottom: 32px;
}
.header {
  padding: 56px 20px 18px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  position: relative;
}
.header::after {
  content:'';
  position:absolute;
  bottom:0; left:20px; right:20px;
  height:1px;
  background: linear-gradient(90deg, var(--green) 0%, transparent 60%);
  opacity:0.3;
}
.logo-wrap { display:flex; flex-direction:column; gap:2px; }
.logo {
  font-family: var(--display);
  font-size: 38px;
  letter-spacing: 3px;
  color: var(--text);
  line-height: 1;
}
.logo em { color: var(--green); font-style: normal; }
.logo-sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
}
.tab {
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.view { display: none; flex-direction: column; }
.view.active { display: flex; }
.status-bar {
  margin: 18px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.status-bar::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:3px;
  background: var(--text3);
  transition: background 0.4s;
  border-radius:3px 0 0 3px;
}
.status-bar.recording::before { background: var(--green); animation: barPulse 1.5s ease-in-out infinite; }
@keyframes barPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-left { display:flex; align-items:center; gap:10px; }
.status-dot {
  width:8px; height:8px;
  border-radius:50%;
  background: var(--text3);
  transition: background 0.4s;
  flex-shrink:0;
}
.status-dot.pulse {
  background: var(--green);
  animation: dotPulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 8px var(--green);
}
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.status-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.status-time {
  font-family: var(--display);
  font-size: 22px;
  color: var(--text);
  letter-spacing: 1px;
}
.controls {
  margin: 14px 20px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn {
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn-start {
  background: linear-gradient(135deg, var(--green) 0%, var(--green2) 100%);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,255,136,0.25);
}
.btn-stop {
  background: linear-gradient(135deg, var(--red) 0%, #cc1133 100%);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,51,85,0.25);
}
.btn-disabled { opacity: 0.25; pointer-events: none; box-shadow: none; }
.btn-manual {
  grid-column: 1/-1;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  padding: 13px;
  letter-spacing: 0;
}
.speedo-section {
  margin: 18px 20px 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.speedo-section::after {
  content:'';
  position:absolute;
  top:-60px; right:-60px;
  width:180px; height:180px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
  pointer-events:none;
}
.speedo-ring { position: relative; width: 130px; height: 130px; flex-shrink:0; }
.speedo-ring svg { width:100%; height:100%; transform:rotate(-135deg); }
.speedo-track { fill:none; stroke:var(--card2); stroke-width:10; stroke-linecap:round; }
.speedo-fill {
  fill:none; stroke:var(--green); stroke-width:10; stroke-linecap:round;
  stroke-dasharray:424; stroke-dashoffset:424;
  transition: stroke-dashoffset 0.5s ease, stroke 0.4s;
  filter: drop-shadow(0 0 6px rgba(0,255,136,0.6));
}
.speedo-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.speed-num {
  font-family: var(--display);
  font-size: 46px;
  line-height:1;
  color: var(--text);
  letter-spacing:1px;
}
.speed-unit { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing:0.1em; }
.speedo-stats { flex:1; display:flex; flex-direction:column; gap:10px; }
.mini-stat {
  display:flex; flex-direction:column; gap:2px;
  padding:10px 12px;
  background:var(--card2);
  border-radius:10px;
  border:1px solid var(--border);
}
.mini-stat-val { font-family: var(--display); font-size:22px; color:var(--text); letter-spacing:1px; line-height:1; }
.mini-stat-label { font-family: var(--mono); font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; }
.route-card {
  margin: 12px 20px 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  display: none;
}
.route-card.visible { display: block; }
.route-title { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
.route-points { display: flex; flex-direction: column; gap: 0; position: relative; }
.route-line {
  position:absolute;
  left:10px; top:22px; bottom:22px;
  width:1px;
  background: linear-gradient(180deg, var(--green) 0%, var(--red) 100%);
  opacity:0.4;
}
.route-point { display:flex; align-items:flex-start; gap:12px; padding:6px 0; }
.route-dot-wrap { width:20px; display:flex; justify-content:center; padding-top:3px; flex-shrink:0; z-index:1; }
.route-dot { width:10px; height:10px; border-radius:50%; border:2px solid; }
.route-dot.start { border-color:var(--green); background:rgba(0,255,136,0.2); }
.route-dot.end { border-color:var(--red); background:rgba(255,51,85,0.2); }
.route-dot.current { border-color:var(--amber); background:rgba(255,170,0,0.2); animation: dotPulse 1.5s ease-in-out infinite; }
.route-info { display:flex; flex-direction:column; gap:2px; }
.route-label { font-family:var(--mono); font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; }
.route-addr { font-size:12px; color:var(--text); line-height:1.4; }
.route-addr.loading { color:var(--text3); font-style:italic; }
.gps-warn {
  margin:12px 20px 0;
  padding:12px 14px;
  background:rgba(255,51,85,0.08);
  border:1px solid rgba(255,51,85,0.25);
  border-radius:10px;
  font-size:12px;
  color:var(--red);
  display:none;
}
.gps-warn.visible { display:block; }
.history-top { padding: 20px 20px 0; display:flex; justify-content:space-between; align-items:center; }
.history-heading { font-family: var(--display); font-size: 28px; letter-spacing: 2px; color: var(--text); }
.km-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.2);
  padding: 5px 12px;
  border-radius: 999px;
}
.trip-list { padding: 14px 20px 0; display:flex; flex-direction:column; gap:10px; }
.trip-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow:hidden;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.trip-card-top { padding:14px 16px; display:flex; justify-content:space-between; align-items:flex-start; }
.trip-left { display:flex; flex-direction:column; gap:4px; }
.trip-date-line { font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; }
.trip-km-big { font-family:var(--display); font-size:32px; color:var(--green); letter-spacing:2px; line-height:1; }
.trip-km-big span { font-size:14px; color:var(--text3); font-family:var(--body); font-weight:400; letter-spacing:0; }
.trip-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.trip-tag { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:0.06em; padding:3px 8px; border-radius:5px; }
.tag-auto { background:rgba(0,255,136,0.1); color:var(--green); }
.tag-manual { background:rgba(68,136,255,0.1); color:var(--blue); }
.trip-del { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:2px 4px; border-radius:6px; transition:color 0.2s; }
.trip-del:active { color:var(--red); }
.trip-card-bottom { padding: 0 16px 14px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; }
.trip-stat { background:var(--card2); border-radius:8px; padding:8px 10px; display:flex; flex-direction:column; gap:2px; }
.trip-stat-val { font-family:var(--mono); font-size:13px; color:var(--text); }
.trip-stat-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; }
.trip-route-strip { margin: 0 16px 14px; padding:10px 12px; background:var(--card2); border-radius:10px; border:1px solid var(--border); display:none; }
.trip-route-strip.has-route { display:block; }
.trip-route-row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text2); line-height:1.4; }
.trip-route-row + .trip-route-row { margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
.route-icon { font-size:10px; flex-shrink:0; }
.empty { padding:60px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--text3); text-align:center; }
.empty-icon { font-size:44px; opacity:0.3; }
.empty-text { font-size:13px; line-height:1.7; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); z-index:100; display:none; align-items:flex-end; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border2); border-radius:24px 24px 0 0; padding:28px 24px 40px; width:100%; max-width:430px; animation:slideUp 0.3s cubic-bezier(.32,.72,0,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-family:var(--display); font-size:26px; letter-spacing:2px; margin-bottom:20px; }
.field { margin-bottom:14px; }
.field label { display:block; font-family:var(--mono); font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
.field input { width:100%; background:var(--card2); border:1px solid var(--border2); border-radius:10px; padding:13px 14px; color:var(--text); font-family:var(--mono); font-size:15px; outline:none; transition:border-color 0.2s; }
.field input:focus { border-color:var(--green); }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.toast { position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--border2); border-radius:12px; padding:11px 20px; font-family:var(--mono); font-size:12px; color:var(--text); z-index:200; opacity:0; transition:all 0.3s; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo">FAHR<em>.</em>BUCH</div>
      <div class="logo-sub">GPS Fahrtenbuch v2</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('tracking')">Tracking</button>
      <button class="tab" onclick="switchTab('history')">Fahrten</button>
    </div>
  </div>
  <div class="view active" id="trackingView">
    <div class="status-bar idle" id="statusBar">
      <div class="status-left">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">Bereit</div>
      </div>
      <div class="status-time" id="statusTimer">0:00</div>
    </div>
    <div class="controls">
      <button class="btn btn-start" id="startBtn" onclick="manualStart()">START</button>
      <button class="btn btn-stop btn-disabled" id="stopBtn" onclick="manualStop()">STOP</button>
      <button class="btn btn-manual" onclick="openModal()">+ Fahrt manuell eintragen</button>
    </div>
    <div class="speedo-section">
      <div class="speedo-ring">
        <svg viewBox="0 0 120 120">
          <circle class="speedo-track" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="78"/>
          <circle class="speedo-fill" id="speedoFill" cx="60" cy="60" r="50"/>
        </svg>
        <div class="speedo-inner">
          <div class="speed-num" id="speedNum">0</div>
          <div class="speed-unit">km/h</div>
        </div>
      </div>
      <div class="speedo-stats">
        <div class="mini-stat"><div class="mini-stat-val" id="statKm">0.0</div><div class="mini-stat-label">Kilometer</div></div>
        <div class="mini-stat"><div class="mini-stat-val" id="statMax">0</div><div class="mini-stat-label">Max km/h</div></div>
        <div class="mini-stat"><div class="mini-stat-val" id="statAvg">0</div><div class="mini-stat-label">Ø km/h</div></div>
      </div>
    </div>
    <div class="route-card" id="routeCard">
      <div class="route-title">Strecke</div>
      <div class="route-points">
        <div class="route-line"></div>
        <div class="route-point">
          <div class="route-dot-wrap"><div class="route-dot start"></div></div>
          <div class="route-info"><div class="route-label">Start</div><div class="route-addr loading" id="addrStart">Wird ermittelt…</div></div>
        </div>
        <div class="route-point">
          <div class="route-dot-wrap"><div class="route-dot current"></div></div>
          <div class="route-info"><div class="route-label">Aktuell</div><div class="route-addr loading" id="addrCurrent">–</div></div>
        </div>
      </div>
    </div>
    <div class="gps-warn" id="gpsWarn">⚠ GPS nicht verfügbar – bitte Standortzugriff erlauben.</div>
  </div>
  <div class="view" id="historyView">
    <div class="history-top">
      <div class="history-heading">FAHRTEN</div>
      <div class="km-badge" id="totalKmBadge">0 km</div>
    </div>
    <div class="trip-list" id="tripList">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🚗</div>
        <div class="empty-text">Noch keine Fahrten gespeichert.<br>Starte deine erste Fahrt!</div>
      </div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">FAHRT EINTRAGEN</div>
    <div class="field"><label>Datum</label><input type="date" id="mDate"/></div>
    <div class="field"><label>Kilometer</label><input type="number" id="mKm" placeholder="z.B. 42.5" step="0.1" min="0"/></div>
    <div class="field"><label>Dauer (Minuten)</label><input type="number" id="mDur" placeholder="z.B. 35" min="0"/></div>
    <div class="field"><label>Startort (optional)</label><input type="text" id="mStart" placeholder="z.B. Berlin Mitte"/></div>
    <div class="field"><label>Zielort (optional)</label><input type="text" id="mEnd" placeholder="z.B. Hamburg Altona"/></div>
    <div class="modal-btns">
      <button class="btn btn-manual" style="flex:1;padding:14px" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-start" style="flex:1;padding:14px;font-size:15px" onclick="saveManual()">Speichern</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SPEED_START=10,SPEED_STOP=5,STOP_DELAY=30;
let S={tracking:false,startTime:null,dist:0,maxSpeed:0,totalSpeed:0,readings:0,stopTicks:0,lastPos:null,watchId:null,timerTick:null,startCoords:null,startAddr:null,currentAddr:null,geoCache:{}};
let trips=JSON.parse(localStorage.getItem('fb_trips')||'[]');
function initGPS(){if(!navigator.geolocation){showGPSWarn(true);return;}S.watchId=navigator.geolocation.watchPosition(onPos,onGPSErr,{enableHighAccuracy:true,maximumAge:1500,timeout:12000});}
async function onPos(p){showGPSWarn(false);const spd=p.coords.speed!=null?Math.max(0,p.coords.speed*3.6):0;updateSpeedo(spd);if(S.tracking){S.totalSpeed+=spd;S.readings++;if(spd>S.maxSpeed)S.maxSpeed=spd;if(S.lastPos)S.dist+=haversine(S.lastPos,p.coords);S.lastPos=p.coords;updateStats();if(S.readings%5===0){const addr=await reverseGeo(p.coords.latitude,p.coords.longitude);if(addr){S.currentAddr=addr;const el=document.getElementById('addrCurrent');if(el){el.textContent=addr;el.classList.remove('loading');}}}if(spd<SPEED_STOP){S.stopTicks++;if(S.stopTicks>=STOP_DELAY/2)doStop(true);}else S.stopTicks=0;}else{if(spd>=SPEED_START)doStart(true,p.coords);}}
function onGPSErr(){showGPSWarn(true);}
async function reverseGeo(lat,lon){const key=lat.toFixed(3)+','+lon.toFixed(3);if(S.geoCache[key])return S.geoCache[key];try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=16&addressdetails=1`,{headers:{'Accept-Language':'de'}});const d=await r.json();const a=d.address;let label='';if(a.road)label=a.road;if(a.house_number)label+=' '+a.house_number;if(a.city||a.town||a.village)label+=', '+(a.city||a.town||a.village);else if(a.suburb)label+=', '+a.suburb;if(!label)label=d.display_name?.split(',').slice(0,2).join(',')||'–';S.geoCache[key]=label;return label;}catch{return null;}}
async function doStart(auto,coords){S.tracking=true;S.startTime=Date.now();S.dist=0;S.maxSpeed=0;S.totalSpeed=0;S.readings=0;S.stopTicks=0;S.lastPos=null;S.startCoords=coords||null;S.startAddr=null;S.currentAddr=null;setStatus('recording',auto?'Automatisch gestartet':'Manuell gestartet');document.getElementById('startBtn').classList.add('btn-disabled');document.getElementById('stopBtn').classList.remove('btn-disabled');const rc=document.getElementById('routeCard');rc.classList.add('visible');document.getElementById('addrStart').textContent='Wird ermittelt…';document.getElementById('addrStart').classList.add('loading');document.getElementById('addrCurrent').textContent='–';if(coords){const addr=await reverseGeo(coords.latitude,coords.longitude);S.startAddr=addr;const el=document.getElementById('addrStart');if(el){el.textContent=addr||'Unbekannt';el.classList.remove('loading');}}S.timerTick=setInterval(tickTimer,1000);showToast(auto?'🚗 Fahrt automatisch gestartet':'🚗 Fahrt gestartet');}
async function doStop(auto){if(!S.tracking)return;S.tracking=false;clearInterval(S.timerTick);let endAddr=null;if(S.lastPos)endAddr=await reverseGeo(S.lastPos.latitude,S.lastPos.longitude);const km=S.dist/1000;if(km>0.05){const trip={id:Date.now(),date:new Date().toISOString(),km:parseFloat(km.toFixed(2)),durationMs:Date.now()-S.startTime,maxSpeed:Math.round(S.maxSpeed),avgSpeed:S.readings>0?Math.round(S.totalSpeed/S.readings):0,method:auto?'auto':'manual',startAddr:S.startAddr||null,endAddr:endAddr||null};trips.unshift(trip);saveTrips();showToast('✓ '+km.toFixed(1)+' km gespeichert');}setStatus('idle','Bereit');document.getElementById('startBtn').classList.remove('btn-disabled');document.getElementById('stopBtn').classList.add('btn-disabled');document.getElementById('routeCard').classList.remove('visible');document.getElementById('statusTimer').textContent='0:00';S.dist=0;S.maxSpeed=0;S.totalSpeed=0;S.readings=0;updateStats();updateSpeedo(0);renderHistory();}
function manualStart(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>doStart(false,p.coords),()=>doStart(false,null),{enableHighAccuracy:true,timeout:8000});}else doStart(false,null);}
function manualStop(){doStop(false);}
function openModal(){document.getElementById('mDate').value=new Date().toISOString().split('T')[0];document.getElementById('mKm').value='';document.getElementById('mDur').value='';document.getElementById('mStart').value='';document.getElementById('mEnd').value='';document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function saveManual(){const date=document.getElementById('mDate').value;const km=parseFloat(document.getElementById('mKm').value);const dur=parseInt(document.getElementById('mDur').value)||0;const sa=document.getElementById('mStart').value.trim();const ea=document.getElementById('mEnd').value.trim();if(!date||isNaN(km)||km<=0){showToast('⚠ Datum und km erforderlich');return;}trips.unshift({id:Date.now(),date:new Date(date).toISOString(),km:parseFloat(km.toFixed(2)),durationMs:dur*60000,maxSpeed:0,avgSpeed:0,method:'manual',startAddr:sa||null,endAddr:ea||null});saveTrips();closeModal();renderHistory();showToast('✓ Fahrt eingetragen');}
function updateSpeedo(spd){const arc=424*0.75;const offset=424-arc*Math.min(spd/200,1)+424*0.25;const fill=document.getElementById('speedoFill');fill.style.strokeDashoffset=offset;fill.style.stroke=spd>130?'var(--red)':spd>90?'var(--amber)':'var(--green)';document.getElementById('speedNum').textContent=Math.round(spd);}
function updateStats(){document.getElementById('statKm').textContent=(S.dist/1000).toFixed(1);document.getElementById('statMax').textContent=Math.round(S.maxSpeed);document.getElementById('statAvg').textContent=S.readings>0?Math.round(S.totalSpeed/S.readings):0;}
function tickTimer(){if(!S.startTime)return;const e=Date.now()-S.startTime;const m=Math.floor(e/60000);const s=Math.floor((e%60000)/1000);document.getElementById('statusTimer').textContent=m+':'+String(s).padStart(2,'0');}
function setStatus(type,text){document.getElementById('statusBar').className='status-bar '+type;document.getElementById('statusDot').className='status-dot'+(type==='recording'?' pulse':'');document.getElementById('statusText').textContent=text;}
function showGPSWarn(v){document.getElementById('gpsWarn').className='gps-warn'+(v?' visible':'');}
function renderHistory(){const list=document.getElementById('tripList');const totalKm=trips.reduce((s,t)=>s+t.km,0);document.getElementById('totalKmBadge').textContent=totalKm.toFixed(1)+' km';list.querySelectorAll('.trip-card').forEach(c=>c.remove());document.getElementById('emptyState').style.display=trips.length?'none':'flex';trips.forEach(t=>{const card=document.createElement('div');card.className='trip-card';const hasRoute=t.startAddr||t.endAddr;card.innerHTML=`<div class="trip-card-top"><div class="trip-left"><div class="trip-date-line">${fmtDate(t.date)}</div><div class="trip-km-big">${t.km.toFixed(1)} <span>km</span></div></div><div class="trip-right"><span class="trip-tag ${t.method==='auto'?'tag-auto':'tag-manual'}">${t.method==='auto'?'⟳ Auto':'✎ Manuell'}</span><button class="trip-del" onclick="delTrip(${t.id})">🗑</button></div></div><div class="trip-card-bottom"><div class="trip-stat"><div class="trip-stat-val">${fmtDur(t.durationMs)}</div><div class="trip-stat-label">Dauer</div></div><div class="trip-stat"><div class="trip-stat-val">${t.avgSpeed||'–'}</div><div class="trip-stat-label">Ø km/h</div></div><div class="trip-stat"><div class="trip-stat-val">${t.maxSpeed||'–'}</div><div class="trip-stat-label">Max km/h</div></div></div><div class="trip-route-strip ${hasRoute?'has-route':''}">${t.startAddr?`<div class="trip-route-row"><span class="route-icon">🟢</span>${t.startAddr}</div>`:''} ${t.endAddr?`<div class="trip-route-row"><span class="route-icon">🔴</span>${t.endAddr}</div>`:''}</div>`;list.appendChild(card);});}
function delTrip(id){trips=trips.filter(t=>t.id!==id);saveTrips();renderHistory();showToast('Fahrt gelöscht');}
function haversine(a,b){const R=6371000;const φ1=a.latitude*Math.PI/180,φ2=b.latitude*Math.PI/180;const Δφ=(b.latitude-a.latitude)*Math.PI/180;const Δλ=(b.longitude-a.longitude)*Math.PI/180;const x=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmtDate(iso){return new Date(iso).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDur(ms){if(!ms)return'–';const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'h '+m%60+'m':m+'m';}
function saveTrips(){localStorage.setItem('fb_trips',JSON.stringify(trips));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function switchTab(tab){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='tracking')||(i===1&&tab==='history')));document.getElementById('trackingView').classList.toggle('active',tab==='tracking');document.getElementById('historyView').classList.toggle('active',tab==='history');if(tab==='history')renderHistory();}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
initGPS();
renderHistory();
</script>
</body>
