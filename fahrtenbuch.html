<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fahrtenbuch" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Fahrtenbuch</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --accent: #00e5a0;
      --accent2: #0066ff;
      --warn: #ff4757;
      --text: #f0f0f8;
      --muted: #6b6b88;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
      --body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      height: 100%;
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
      top: -100px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    /* Header */
    .header {
      position: relative; z-index: 10;
      padding: 52px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .tab-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      padding: 6px 14px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Views */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; z-index: 1; }
    .view.active { display: flex; }

    /* === TRACKING VIEW === */
    .status-section {
      padding: 28px 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid;
      transition: all 0.4s;
    }

    .status-badge.idle {
      background: rgba(107,107,136,0.1);
      color: var(--muted);
      border-color: var(--border);
    }
    .status-badge.active {
      background: rgba(0,229,160,0.1);
      color: var(--accent);
      border-color: rgba(0,229,160,0.3);
    }
    .status-badge.paused {
      background: rgba(255,171,0,0.1);
      color: #ffab00;
      border-color: rgba(255,171,0,0.3);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .dot.pulse { animation: dotPulse 1.5s ease-in-out infinite; }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Speedometer */
    .speedo-wrap {
      padding: 20px 24px;
      display: flex;
      justify-content: center;
    }

    .speedo {
      position: relative;
      width: 240px; height: 240px;
    }

    .speedo svg {
      width: 100%; height: 100%;
      transform: rotate(-135deg);
    }

    .speedo-track {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 14;
      stroke-linecap: round;
    }

    .speedo-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 565;
      stroke-dashoffset: 565;
      transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
      filter: drop-shadow(0 0 8px rgba(0,229,160,0.5));
    }

    .speedo-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .speedo-value {
      font-family: var(--display);
      font-size: 58px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .speedo-unit {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 0 24px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Trip info */
    .trip-info {
      margin: 0 24px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: none;
      gap: 0;
    }

    .trip-info.visible { display: flex; flex-direction: column; }

    .trip-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .trip-info-row:not(:last-child) { border-bottom: 1px solid var(--border); }

    .trip-info-label {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .trip-info-val {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-family: var(--mono);
    }

    /* GPS Error */
    .gps-error {
      margin: 0 24px;
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--warn);
      display: none;
    }

    .gps-error.visible { display: block; }

    /* Manual controls */
    .manual-controls {
      padding: 0 24px 16px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn:active { transform: scale(0.96); }

    .btn-start {
      background: var(--accent);
      color: #000;
    }

    .btn-stop {
      background: var(--warn);
      color: #fff;
    }

    .btn-manual {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: var(--body);
      font-size: 13px;
      font-weight: 500;
    }

    .btn-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* === HISTORY VIEW === */
    .history-header {
      padding: 20px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-title {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 800;
    }

    .history-total {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.2);
      padding: 5px 12px;
      border-radius: 999px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-list::-webkit-scrollbar { display: none; }

    .trip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      animation: cardIn 0.3s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .trip-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .trip-date {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .trip-km {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }

    .trip-km span {
      font-size: 13px;
      font-weight: 400;
      font-family: var(--body);
      color: var(--muted);
    }

    .trip-card-details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .detail-item { display: flex; flex-direction: column; gap: 2px; }

    .detail-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-val {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }

    .trip-card-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .trip-method {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .method-auto { background: rgba(0,229,160,0.1); color: var(--accent); }
    .method-manual { background: rgba(0,102,255,0.1); color: var(--accent2); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: var(--warn); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-text { font-size: 14px; text-align: center; line-height: 1.6; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 430px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-title {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .modal-field { margin-bottom: 16px; }

    .modal-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: var(--mono);
      text-transform: uppercase;
    }

    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      outline: none;
    }

    .modal-input:focus { border-color: var(--accent); }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .notify-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text);
      z-index: 200;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .notify-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow" id="bgGlow"></div>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">Fahr<span>.</span>buch</div>
    <div class="tab-toggle">
      <button class="tab-btn active" onclick="switchTab('tracking')">Tracking</button>
      <button class="tab-btn" onclick="switchTab('history')">Fahrten</button>
    </div>
  </div>

  <!-- TRACKING VIEW -->
  <div class="view active" id="trackingView">
    <div class="status-section">
      <div class="status-badge idle" id="statusBadge">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Bereit</span>
      </div>
    </div>

    <!-- Speedometer -->
    <div class="speedo-wrap">
      <div class="speedo">
        <svg viewBox="0 0 200 200">
          <circle class="speedo-track" cx="100" cy="100" r="90" stroke-dasharray="565" stroke-dashoffset="141" />
          <circle class="speedo-fill" id="speedoFill" cx="100" cy="100" r="90" />
        </svg>
        <div class="speedo-center">
          <div class="speedo-value" id="speedoValue">0</div>
          <div class="speedo-unit">km/h</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statKm">0.0</div>
        <div class="stat-label">km</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTime">0:00</div>
        <div class="stat-label">Dauer</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statMax">0</div>
        <div class="stat-label">Max km/h</div>
      </div>
    </div>

    <!-- Trip info when active -->
    <div class="trip-info" id="tripInfo">
      <div class="trip-info-row">
        <span class="trip-info-label">Start</span>
        <span class="trip-info-val" id="infoStart">–</span>
      </div>
      <div class="trip-info-row">
        <span class="trip-info-label">GPS-Punkte</span>
        <span class="trip-info-val" id="infoPoints">0</span>
      </div>
      <div class="trip-info-row">
        <span class="trip-info-label">Ø Geschw.</span>
        <span class="trip-info-val" id="infoAvg">0 km/h</span>
      </div>
    </div>

    <!-- GPS Error -->
    <div class="gps-error" id="gpsError">
      ⚠ GPS nicht verfügbar. Bitte Standortzugriff erlauben.
    </div>

    <!-- Controls -->
    <div class="manual-controls">
      <button class="btn btn-start" id="startBtn" onclick="manualStart()">▶ Start</button>
      <button class="btn btn-stop btn-disabled" id="stopBtn" onclick="manualStop()">■ Stop</button>
    </div>
    <div class="manual-controls" style="padding-top:0;">
      <button class="btn btn-manual" onclick="openManualEntry()">+ Fahrt manuell eintragen</button>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="historyView">
    <div class="history-header">
      <div class="history-title">Meine Fahrten</div>
      <div class="history-total" id="historyTotal">0 km</div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🚗</div>
        <div class="empty-text">Noch keine Fahrten aufgezeichnet.<br>Starte deine erste Fahrt!</div>
      </div>
    </div>
  </div>
</div>

<!-- Manual Entry Modal -->
<div class="modal-overlay" id="manualModal">
  <div class="modal">
    <div class="modal-title">Fahrt eintragen</div>
    <div class="modal-field">
      <label class="modal-label">Datum</label>
      <input type="date" class="modal-input" id="manualDate" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Strecke (km)</label>
      <input type="number" class="modal-input" id="manualKm" placeholder="z.B. 42.5" step="0.1" min="0" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Dauer (Minuten)</label>
      <input type="number" class="modal-input" id="manualDuration" placeholder="z.B. 35" min="0" />
    </div>
    <div class="modal-buttons">
      <button class="btn btn-manual" style="flex:1" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-start" style="flex:1" onclick="saveManualEntry()">Speichern</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="notify-toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
const AUTO_START_SPEED = 10;   // km/h threshold to auto-start
const AUTO_STOP_SPEED  = 5;    // km/h threshold to consider stopped
const AUTO_STOP_SECS   = 30;   // seconds below threshold before auto-stop

let state = {
  tracking: false,
  autoMode: true,
  speed: 0,
  maxSpeed: 0,
  totalDist: 0,       // meters
  startTime: null,
  timerInterval: null,
  stopCounter: 0,
  positions: [],
  lastPos: null,
  watchId: null,
  pointCount: 0,
  totalSpeed: 0,
  speedReadings: 0,
};

let trips = JSON.parse(localStorage.getItem('fahrtenbuch_trips') || '[]');

// ── GPS ────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    showGPSError(true);
    return;
  }
  state.watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });
}

function stopGPS() {
  if (state.watchId !== null) {
    navigator.geolocation.clearWatch(state.watchId);
    state.watchId = null;
  }
}

function onPosition(pos) {
  showGPSError(false);
  const speed = pos.coords.speed !== null ? pos.coords.speed * 3.6 : 0; // m/s → km/h
  const currentSpeed = Math.max(0, speed);

  state.speed = currentSpeed;
  updateSpeedometer(currentSpeed);

  if (state.tracking) {
    state.pointCount++;
    state.totalSpeed += currentSpeed;
    state.speedReadings++;

    if (currentSpeed > state.maxSpeed) state.maxSpeed = currentSpeed;

    // Distance
    if (state.lastPos) {
      const d = haversine(state.lastPos, pos.coords);
      state.totalDist += d;
    }
    state.lastPos = pos.coords;

    updateStats();
    updateTripInfo();

    // Auto-stop logic
    if (currentSpeed < AUTO_STOP_SPEED) {
      state.stopCounter++;
      if (state.stopCounter >= AUTO_STOP_SECS / 2) {
        autoStop();
      }
    } else {
      state.stopCounter = 0;
    }
  } else {
    // Auto-start logic
    if (currentSpeed >= AUTO_START_SPEED) {
      autoStart();
    }
  }
}

function onGPSError(err) {
  showGPSError(true);
}

// ── Auto Start/Stop ────────────────────────────────────────────────
function autoStart() {
  beginTracking('auto');
}

function autoStop() {
  if (state.tracking) {
    const km = state.totalDist / 1000;
    if (km > 0.1) {
      saveTrip('auto');
      showToast(`✓ Fahrt gespeichert – ${km.toFixed(1)} km`);
    }
    endTracking();
  }
}

function manualStart() {
  beginTracking('manual');
}

function manualStop() {
  if (!state.tracking) return;
  const km = state.totalDist / 1000;
  if (km > 0.01) {
    saveTrip('manual');
    showToast(`✓ Fahrt gespeichert – ${km.toFixed(1)} km`);
  }
  endTracking();
}

function beginTracking(method) {
  state.tracking = true;
  state.startTime = Date.now();
  state.totalDist = 0;
  state.maxSpeed = 0;
  state.stopCounter = 0;
  state.lastPos = null;
  state.pointCount = 0;
  state.totalSpeed = 0;
  state.speedReadings = 0;

  setStatus('active', 'Aufnahme läuft');
  document.getElementById('startBtn').classList.add('btn-disabled');
  document.getElementById('stopBtn').classList.remove('btn-disabled');
  document.getElementById('tripInfo').classList.add('visible');
  document.getElementById('infoStart').textContent = formatTime(new Date());
  document.getElementById('bgGlow').style.background = 'radial-gradient(circle, rgba(0,229,160,0.12) 0%, transparent 70%)';

  state.timerInterval = setInterval(updateTimer, 1000);
}

function endTracking() {
  state.tracking = false;
  clearInterval(state.timerInterval);

  setStatus('idle', 'Bereit');
  document.getElementById('startBtn').classList.remove('btn-disabled');
  document.getElementById('stopBtn').classList.add('btn-disabled');
  document.getElementById('tripInfo').classList.remove('visible');

  // Reset stats
  state.totalDist = 0;
  state.maxSpeed = 0;
  updateStats();
  updateSpeedometer(0);
  document.getElementById('statTime').textContent = '0:00';
  document.getElementById('bgGlow').style.background = 'radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%)';
  renderHistory();
}

// ── Save Trip ──────────────────────────────────────────────────────
function saveTrip(method) {
  const durationMs = Date.now() - state.startTime;
  const km = state.totalDist / 1000;
  const avgSpeed = state.speedReadings > 0 ? state.totalSpeed / state.speedReadings : 0;

  const trip = {
    id: Date.now(),
    date: new Date().toISOString(),
    km: parseFloat(km.toFixed(2)),
    durationMs,
    maxSpeed: Math.round(state.maxSpeed),
    avgSpeed: Math.round(avgSpeed),
    method,
  };

  trips.unshift(trip);
  localStorage.setItem('fahrtenbuch_trips', JSON.stringify(trips));
}

// ── Manual Entry ───────────────────────────────────────────────────
function openManualEntry() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('manualDate').value = today;
  document.getElementById('manualKm').value = '';
  document.getElementById('manualDuration').value = '';
  document.getElementById('manualModal').classList.add('open');
}

function closeModal() {
  document.getElementById('manualModal').classList.remove('open');
}

function saveManualEntry() {
  const date = document.getElementById('manualDate').value;
  const km = parseFloat(document.getElementById('manualKm').value);
  const duration = parseInt(document.getElementById('manualDuration').value) || 0;

  if (!date || isNaN(km) || km <= 0) {
    showToast('⚠ Bitte km und Datum eingeben');
    return;
  }

  const trip = {
    id: Date.now(),
    date: new Date(date).toISOString(),
    km: parseFloat(km.toFixed(2)),
    durationMs: duration * 60 * 1000,
    maxSpeed: 0,
    avgSpeed: 0,
    method: 'manual',
  };

  trips.unshift(trip);
  localStorage.setItem('fahrtenbuch_trips', JSON.stringify(trips));
  closeModal();
  renderHistory();
  showToast('✓ Fahrt eingetragen');
}

// ── UI Updates ─────────────────────────────────────────────────────
function updateSpeedometer(speed) {
  const max = 180;
  const pct = Math.min(speed / max, 1);
  const arc = 565 * 0.75; // 270 deg arc
  const offset = 565 - (arc * pct) + (565 * 0.25);

  const fill = document.getElementById('speedoFill');
  fill.style.strokeDashoffset = offset;

  if (speed > 120) fill.style.stroke = '#ff4757';
  else if (speed > 80) fill.style.stroke = '#ffab00';
  else fill.style.stroke = 'var(--accent)';

  document.getElementById('speedoValue').textContent = Math.round(speed);
}

function updateStats() {
  const km = state.totalDist / 1000;
  document.getElementById('statKm').textContent = km.toFixed(1);
  document.getElementById('statMax').textContent = Math.round(state.maxSpeed);
}

function updateTimer() {
  if (!state.startTime) return;
  const elapsed = Date.now() - state.startTime;
  const mins = Math.floor(elapsed / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);
  document.getElementById('statTime').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
}

function updateTripInfo() {
  document.getElementById('infoPoints').textContent = state.pointCount;
  const avg = state.speedReadings > 0 ? Math.round(state.totalSpeed / state.speedReadings) : 0;
  document.getElementById('infoAvg').textContent = avg + ' km/h';
}

function setStatus(type, text) {
  const badge = document.getElementById('statusBadge');
  const dot = document.getElementById('statusDot');
  badge.className = `status-badge ${type}`;
  dot.className = `dot ${type === 'active' ? 'pulse' : ''}`;
  document.getElementById('statusText').textContent = text;
}

function showGPSError(show) {
  document.getElementById('gpsError').className = `gps-error ${show ? 'visible' : ''}`;
}

// ── History ────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('emptyState');
  const totalEl = document.getElementById('historyTotal');

  const totalKm = trips.reduce((s, t) => s + t.km, 0);
  totalEl.textContent = totalKm.toFixed(1) + ' km';

  // Remove all cards (not empty state)
  const cards = list.querySelectorAll('.trip-card');
  cards.forEach(c => c.remove());

  if (trips.length === 0) {
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';

  trips.forEach((trip, i) => {
    const card = document.createElement('div');
    card.className = 'trip-card';
    card.innerHTML = `
      <div class="trip-card-header">
        <div>
          <div class="trip-date">${formatDate(trip.date)}</div>
        </div>
        <div class="trip-km">${trip.km.toFixed(1)} <span>km</span></div>
      </div>
      <div class="trip-card-details">
        <div class="detail-item">
          <div class="detail-label">Dauer</div>
          <div class="detail-val">${formatDuration(trip.durationMs)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Ø km/h</div>
          <div class="detail-val">${trip.avgSpeed || '–'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Max km/h</div>
          <div class="detail-val">${trip.maxSpeed || '–'}</div>
        </div>
      </div>
      <div class="trip-card-footer">
        <span class="trip-method ${trip.method === 'auto' ? 'method-auto' : 'method-manual'}">
          ${trip.method === 'auto' ? '⟳ Auto' : '✎ Manuell'}
        </span>
        <button class="delete-btn" onclick="deleteTrip(${trip.id})">🗑</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function deleteTrip(id) {
  trips = trips.filter(t => t.id !== id);
  localStorage.setItem('fahrtenbuch_trips', JSON.stringify(trips));
  renderHistory();
  showToast('Fahrt gelöscht');
}

// ── Helpers ────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371000;
  const lat1 = a.latitude * Math.PI / 180;
  const lat2 = b.latitude * Math.PI / 180;
  const dLat = (b.latitude - a.latitude) * Math.PI / 180;
  const dLon = (b.longitude - a.longitude) * Math.PI / 180;
  const x = Math.sin(dLat/2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatTime(d) {
  return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function formatDuration(ms) {
  if (!ms) return '–';
  const m = Math.floor(ms / 60000);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}min`;
  return `${m} min`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'tracking') || (i === 1 && tab === 'history'));
  });
  document.getElementById('trackingView').classList.toggle('active', tab === 'tracking');
  document.getElementById('historyView').classList.toggle('active', tab === 'history');
  if (tab === 'history') renderHistory();
}

// ── Init ───────────────────────────────────────────────────────────
startGPS();
renderHistory();

// Close modal on backdrop tap
document.getElementById('manualModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
